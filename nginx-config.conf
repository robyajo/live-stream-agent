# Nginx Configuration for TikTok Live Stream Agent (Socket.IO)
# Place this in /etc/nginx/sites-available/your-domain.com

server {
    listen 80;
    server_name socket.yourdomain.com; # Ganti dengan domain/subdomain Anda

    location / {
        # Proxy to the Node.js application
        # Ganti port 9000 sesuai dengan listener_port di Laravel Config
        proxy_pass http://127.0.0.1:9000; 

        # Webcast/Socket.IO specific settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for persistent socket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

# Optional: Configuration if you want to use the same domain as Laravel
